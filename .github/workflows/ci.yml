name: CI

on:
  push:
    branches: [main, master, dev, V2]
  pull_request:
    branches: [main, master, dev, V2]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      # Opt in early to upcoming GitHub runner default and avoid Node 20 deprecation drift.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Secret pattern guard (no committed .env / secret values)
        run: python scripts/check_committed_secrets.py --all-tracked

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Runtime deps for imports during tests (minimal; shrink/expand if CI import errors appear).
      - name: Install tools and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv ruff pytest pytest-cov web3

      - name: Ruff
        run: python -m ruff check .

      - name: Compile
        run: python -m compileall -q .

      - name: Pytest + coverage
        run: >-
          python -m pytest tests/
          --cov=.
          --cov-report=term-missing:skip-covered
          --cov-report=xml

      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: coverage-xml
          path: coverage.xml
