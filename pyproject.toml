[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "archive", "artifacts", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "B"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["nanoclaw", "modules", "external_layer"]

[tool.ruff.lint.per-file-ignores]
# Public façade: symbols are imported so `clean_swap.X` / monkeypatch targets exist.
"clean_swap.py" = ["F401"]

[tool.coverage.run]
branch = true
omit = ["archive/*", "tests/*"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = true
exclude = "(^archive/|^artifacts/|^\\.venv/)"
